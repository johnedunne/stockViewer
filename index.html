<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS — Global Markets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg-primary: #080c10;
    --bg-secondary: #0d1117;
    --bg-card: #111820;
    --bg-elevated: #16202c;
    --border: #1e2d3d;
    --border-bright: #2a3f55;
    --accent: #00d4ff;
    --accent-dim: rgba(0,212,255,0.12);
    --accent-green: #00e5a0;
    --accent-red: #ff4757;
    --accent-amber: #ffa502;
    --text-primary: #e8f0f8;
    --text-secondary: #7a9bb5;
    --text-muted: #3a5570;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(0,212,255,0.04) 0%, transparent 70%),
      linear-gradient(180deg, rgba(0,212,255,0.02) 0%, transparent 30%);
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    background: rgba(8,12,16,0.95);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .logo-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 2rem;
  }

  .live-badge {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--accent-green);
    border: 1px solid rgba(0,229,160,0.3);
    padding: 3px 10px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .live-dot {
    width: 5px; height: 5px;
    background: var(--accent-green);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }

  .clock {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-secondary);
    letter-spacing: 0.05em;
  }

  /* MARKET TICKER */
  .ticker-bar {
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    overflow: hidden;
    height: 36px;
    display: flex;
    align-items: center;
  }

  .ticker-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 0 14px;
    height: 100%;
    display: flex;
    align-items: center;
    border-right: 1px solid var(--border);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .ticker-scroll {
    display: flex;
    animation: ticker 35s linear infinite;
    white-space: nowrap;
    gap: 0;
  }

  .ticker-scroll:hover { animation-play-state: paused; }

  @keyframes ticker {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .ticker-item {
    font-family: var(--mono);
    font-size: 0.7rem;
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-right: 1px solid var(--border);
    height: 36px;
    color: var(--text-secondary);
  }

  .ticker-item .sym { color: var(--text-primary); font-weight: 500; }
  .ticker-item .up { color: var(--accent-green); }
  .ticker-item .dn { color: var(--accent-red); }

  /* MAIN */
  main { max-width: 1600px; margin: 0 auto; padding: 2rem; }

  /* SEARCH */
  .search-zone {
    margin-bottom: 2rem;
  }

  .search-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
  }

  .search-row {
    display: flex;
    gap: 0;
    border: 1px solid var(--border-bright);
    background: var(--bg-card);
    position: relative;
  }

  .search-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(0,212,255,0.2), 0 0 20px rgba(0,212,255,0.06);
  }

  .search-prefix {
    font-family: var(--mono);
    font-size: 1rem;
    color: var(--accent);
    padding: 0 1rem;
    display: flex;
    align-items: center;
    border-right: 1px solid var(--border);
    background: var(--accent-dim);
  }

  #symbolInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--mono);
    font-size: 1.2rem;
    font-weight: 500;
    color: var(--text-primary);
    padding: 0.9rem 1.2rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  #symbolInput::placeholder {
    color: var(--text-muted);
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    text-transform: none;
  }

  .search-btn {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    color: var(--bg-primary);
    background: var(--accent);
    border: none;
    padding: 0 1.8rem;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .search-btn:hover { background: #33ddff; }
  .search-btn:active { transform: scale(0.98); }

  .quick-symbols {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.7rem;
    flex-wrap: wrap;
  }

  .quick-sym {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--text-secondary);
    border: 1px solid var(--border);
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg-secondary);
  }

  .quick-sym:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* REGION TABS */
  .region-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--border);
  }

  .region-tab {
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    padding: 0.7rem 1.4rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    text-transform: uppercase;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .region-tab:hover { color: var(--text-secondary); }
  .region-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* RESULTS SECTION */
  #results { display: none; }
  #results.visible { display: block; }

  /* STOCK HEADER */
  .stock-header {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    align-items: start;
  }

  .stock-title-block {}

  .stock-symbol-line {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 0.3rem;
  }

  .stock-symbol {
    font-family: var(--mono);
    font-size: 2rem;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.05em;
  }

  .stock-exchange-badge {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    border: 1px solid rgba(0,212,255,0.3);
    padding: 3px 8px;
    background: var(--accent-dim);
  }

  .stock-name {
    font-size: 0.85rem;
    color: var(--text-secondary);
    font-weight: 300;
  }

  .price-block {
    text-align: right;
  }

  .main-price {
    font-family: var(--mono);
    font-size: 2.4rem;
    font-weight: 500;
    line-height: 1;
    color: var(--text-primary);
  }

  .price-change {
    font-family: var(--mono);
    font-size: 0.85rem;
    margin-top: 0.3rem;
  }

  .price-change.up { color: var(--accent-green); }
  .price-change.dn { color: var(--accent-red); }

  /* GRID LAYOUT */
  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto auto;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .panel {
    background: var(--bg-card);
    padding: 1.5rem;
  }

  .panel-chart { grid-row: 1; grid-column: 1; }
  .panel-attrs { grid-row: 1 / 3; grid-column: 2; }
  .panel-summary { grid-row: 2; grid-column: 1; }

  .panel-title {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .panel-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* CHART TIMEFRAME */
  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .timeframes {
    display: flex;
    gap: 2px;
  }

  .tf-btn {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    background: none;
    border: 1px solid transparent;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tf-btn:hover { color: var(--text-secondary); }
  .tf-btn.active {
    color: var(--accent);
    border-color: rgba(0,212,255,0.3);
    background: var(--accent-dim);
  }

  .chart-wrap {
    position: relative;
    height: 260px;
  }

  /* ATTRIBUTES TABLE */
  .attr-grid {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .attr-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.65rem 0;
    border-bottom: 1px solid var(--border);
    gap: 1rem;
  }

  .attr-row:last-child { border-bottom: none; }

  .attr-key {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .attr-val {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--text-primary);
    text-align: right;
  }

  .attr-val.highlight { color: var(--accent); }
  .attr-val.up { color: var(--accent-green); }
  .attr-val.dn { color: var(--accent-red); }
  .attr-val.amber { color: var(--accent-amber); }

  /* RANGE BAR */
  .range-container {
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
    margin-top: 0.5rem;
  }

  .range-label-row {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-muted);
  }

  .range-bar-outer {
    height: 4px;
    background: var(--border);
    position: relative;
    border-radius: 0;
  }

  .range-bar-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--accent-red), var(--accent-green));
    transition: width 0.5s ease;
  }

  .range-bar-dot {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 8px; height: 8px;
    background: var(--text-primary);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(255,255,255,0.4);
  }

  /* SUMMARY */
  .summary-text {
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--text-secondary);
    line-height: 1.75;
  }

  .summary-meta {
    display: flex;
    gap: 1.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
  }

  .summary-meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .summary-meta-key {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .summary-meta-val {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-secondary);
  }

  /* REGION MARKETS OVERVIEW */
  .markets-overview {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 1.5rem;
  }

  .market-card {
    background: var(--bg-card);
    padding: 1rem 1.2rem;
  }

  .market-region {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .market-index {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--text-secondary);
    margin-bottom: 0.3rem;
  }

  .market-value {
    font-family: var(--mono);
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--text-primary);
  }

  .market-chg {
    font-family: var(--mono);
    font-size: 0.68rem;
    margin-top: 2px;
  }

  /* LOADING */
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem;
    flex-direction: column;
    gap: 1rem;
  }

  .loader {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--mono);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* ERROR */
  .error-state {
    padding: 2rem;
    border: 1px solid rgba(255,71,87,0.3);
    background: rgba(255,71,87,0.05);
    color: var(--accent-red);
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  /* FOOTER */
  footer {
    margin-top: 2rem;
    padding: 1rem 0;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .footer-note {
    font-family: var(--mono);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--text-muted);
  }

  /* REFRESH INDICATOR */
  .refresh-bar {
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
    margin-top: -1px;
  }

  .refresh-progress {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    background: var(--accent);
    transition: width linear;
    opacity: 0.6;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .dashboard-grid {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
    }
    .panel-attrs { grid-row: auto; grid-column: 1; }
    .panel-summary { grid-row: auto; grid-column: 1; }
    .markets-overview { grid-template-columns: 1fr; }
    .stock-header { grid-template-columns: 1fr; }
    .price-block { text-align: left; }
  }

  /* Fade in animation */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeInUp 0.35s ease forwards; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    ATLAS
    <span style="font-size:0.6rem;color:var(--text-muted);letter-spacing:0.1em;font-weight:300">/ GLOBAL MARKETS</span>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
    <div class="clock" id="clock">--:--:-- UTC</div>
  </div>
</header>

<!-- REFRESH BAR -->
<div class="refresh-bar"><div class="refresh-progress" id="refreshProgress"></div></div>

<!-- TICKER -->
<div class="ticker-bar">
  <div class="ticker-label">INDICES</div>
  <div style="overflow:hidden;flex:1">
    <div class="ticker-scroll" id="tickerScroll"></div>
  </div>
</div>

<main>

  <!-- MARKET OVERVIEW -->
  <div class="markets-overview" id="marketsOverview"></div>

  <!-- SEARCH -->
  <div class="search-zone">
    <div class="search-label">// Symbol Search — EMEA · APAC · AMRS</div>
    <div class="search-row">
      <div class="search-prefix">$</div>
      <input type="text" id="symbolInput" placeholder="Enter ticker symbol  (e.g. AAPL, TSLA, ASML, 9984.T)" autocomplete="off" spellcheck="false">
      <button class="search-btn" onclick="searchStock()">FETCH →</button>
    </div>
    <div class="quick-symbols" id="quickSymbols"></div>
  </div>

  <!-- REGION TABS -->
  <div class="region-tabs">
    <button class="region-tab active" onclick="setRegion('all',this)">ALL REGIONS</button>
    <button class="region-tab" onclick="setRegion('amrs',this)">AMRS</button>
    <button class="region-tab" onclick="setRegion('emea',this)">EMEA</button>
    <button class="region-tab" onclick="setRegion('apac',this)">APAC</button>
  </div>

  <!-- LOADING / ERROR / RESULTS -->
  <div id="loadingState" style="display:none">
    <div class="loading-state">
      <div class="loader"></div>
      <div class="loading-text">Fetching market data...</div>
    </div>
  </div>

  <div id="errorState" style="display:none"></div>

  <div id="results">
    <!-- STOCK HEADER -->
    <div class="stock-header fade-in" id="stockHeader"></div>

    <!-- DASHBOARD GRID -->
    <div class="dashboard-grid fade-in">
      <!-- CHART -->
      <div class="panel panel-chart">
        <div class="chart-header">
          <div class="panel-title" style="margin-bottom:0">PRICE HISTORY</div>
          <div class="timeframes">
            <button class="tf-btn active" onclick="setTimeframe('1D',this)">1D</button>
            <button class="tf-btn" onclick="setTimeframe('1W',this)">1W</button>
            <button class="tf-btn" onclick="setTimeframe('1M',this)">1M</button>
            <button class="tf-btn" onclick="setTimeframe('3M',this)">3M</button>
            <button class="tf-btn" onclick="setTimeframe('1Y',this)">1Y</button>
          </div>
        </div>
        <div class="chart-wrap">
          <canvas id="priceChart"></canvas>
        </div>
      </div>

      <!-- ATTRIBUTES -->
      <div class="panel panel-attrs">
        <div class="panel-title">Stock Attributes</div>
        <div id="rangeDisplay" class="range-container" style="margin-bottom:1rem"></div>
        <div class="attr-grid" id="attrGrid"></div>
      </div>

      <!-- SUMMARY -->
      <div class="panel panel-summary">
        <div class="panel-title">Company Overview</div>
        <div id="summaryContent"></div>
      </div>
    </div>
  </div>

</main>

<footer>
  <div class="footer-note">ATLAS / GLOBAL MARKETS — SIMULATED DATA FOR DEMONSTRATION. NOT FINANCIAL ADVICE.</div>
  <div class="footer-note" id="lastUpdated">LAST UPDATED: —</div>
</footer>

<script>
// ══════════════════════════════════════════════════════════════════════════
//  ATLAS — GLOBAL MARKETS  |  Yahoo Finance via RapidAPI
//
//  SETUP (3 steps):
//  1. Go to https://rapidapi.com and create a free account
//  2. Search "Yahoo Finance" → subscribe to "Yahoo Finance by Apidojo"
//     (free tier gives 500 req/month — enough for personal use)
//  3. Copy your X-RapidAPI-Key from the RapidAPI dashboard and paste below
//
//  DEPLOY TO GITHUB PAGES:
//  - Create a repo, add this file as index.html, enable Pages in Settings
// ══════════════════════════════════════════════════════════════════════════

const RAPIDAPI_KEY  = 'AAPL%2C%20MSFT%2C%20GOOG';  // ← paste your key here
const RAPIDAPI_HOST = 'enclout-yahoo-finance.p.rapidapi.com';
const API_BASE      = `https://${RAPIDAPI_HOST}/api/v1`;

const API_HEADERS = {
  'x-rapidapi-key':  RAPIDAPI_KEY,
  'x-rapidapi-host': RAPIDAPI_HOST
};

// ── UTILITY ────────────────────────────────────────────────────────────────
function fmt(n, d=2) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
}
function fmtBig(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return (n/1e9).toFixed(2)  + 'B';
  if (n >= 1e6)  return (n/1e6).toFixed(2)  + 'M';
  return fmt(n, 0);
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';
}
function safe(v, fallback='—') { return (v != null && v !== '' && !isNaN(v)) ? v : fallback; }

// Fetch a real-time quote + company summary for a symbol
async function fetchQuote(symbol) {
  const url = `${API_BASE}/markets/stock/quotes?ticker=${encodeURIComponent(symbol)}`;
  const res = await fetch(url, { headers: API_HEADERS });
  if (!res.ok) throw new Error(`Quote fetch failed: ${res.status} ${res.statusText}`);
  const data = await res.json();
  // API returns { body: [ { ... } ] }
  const q = data?.body?.[0];
  if (!q) throw new Error(`No quote data returned for ${symbol}`);
  return q;
}

// Fetch company profile / summary info
async function fetchProfile(symbol) {
  const url = `${API_BASE}/markets/stock/modules?ticker=${encodeURIComponent(symbol)}&module=asset-profile`;
  const res = await fetch(url, { headers: API_HEADERS });
  if (!res.ok) return null; // non-fatal — summary is optional
  const data = await res.json();
  return data?.body?.assetProfile || null;
}

// Fetch historical chart data for the price graph
async function fetchChart(symbol, timeframe) {
  const { interval, range } = TF_PARAMS[timeframe] || TF_PARAMS['1D'];
  const url = `${API_BASE}/markets/stock/history?ticker=${encodeURIComponent(symbol)}&interval=${interval}&diffandsplits=false`;
  const res = await fetch(url, { headers: API_HEADERS });
  if (!res.ok) throw new Error(`Chart fetch failed: ${res.status}`);
  const data = await res.json();
  // Returns { body: { ...timestamps: { close, timestamp } } }
  const body = data?.body;
  if (!body) return { labels: [], prices: [] };

  // body is an object keyed by unix timestamp string
  const entries = Object.entries(body)
    .filter(([k]) => !isNaN(Number(k)))
    .sort(([a],[b]) => Number(a)-Number(b));

  const labels = entries.map(([ts]) => {
    const d = new Date(Number(ts) * 1000);
    if (timeframe === '1D') {
      return d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
    } else if (timeframe === '1W') {
      return d.toLocaleDateString('en-GB', {weekday:'short', day:'numeric'});
    } else {
      return d.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
    }
  });
  const prices = entries.map(([, v]) => v.close != null ? +v.close.toFixed(4) : null).filter(Boolean);

  return { labels: labels.slice(-prices.length), prices };
}

// Fetch a batch of index quotes for the ticker bar & market cards
async function fetchIndexBatch(symbols) {
  const joined = symbols.map(encodeURIComponent).join(',');
  const url = `${API_BASE}/markets/stock/quotes?ticker=${joined}`;
  const res = await fetch(url, { headers: API_HEADERS });
  if (!res.ok) return [];
  const data = await res.json();
  return data?.body || [];
}

// ── TICKER BAR ─────────────────────────────────────────────────────────────
async function buildTicker() {
  const allIndices = [...MARKET_INDICES.amrs, ...MARKET_INDICES.emea, ...MARKET_INDICES.apac];
  const symbols = allIndices.map(i => i.symbol);

  let quotes = [];
  try { quotes = await fetchIndexBatch(symbols); } catch(e) { /* silent */ }

  // Build lookup by symbol
  const lookup = {};
  quotes.forEach(q => { if (q.symbol) lookup[q.symbol] = q; });

  let html = '';
  for (let pass = 0; pass < 2; pass++) {
    allIndices.forEach(idx => {
      const q = lookup[idx.symbol];
      const price = q?.regularMarketPrice ?? q?.price ?? null;
      const chgPct = q?.regularMarketChangePercent ?? q?.changesPercentage ?? 0;
      const isUp = chgPct >= 0;
      const arrow = isUp ? '▲' : '▼';
      const cls   = isUp ? 'up' : 'dn';
      const displayPrice = price != null ? fmt(price, price > 1000 ? 0 : 2) : '—';
      html += `<div class="ticker-item">
        <span class="sym">${idx.symbol.replace('^','')}</span>
        <span>${displayPrice}</span>
        <span class="${cls}">${arrow} ${Math.abs(chgPct).toFixed(2)}%</span>
      </div>`;
    });
  }
  document.getElementById('tickerScroll').innerHTML = html;
}

async function buildMarketOverview() {

    MARKET_INDICES.emea[0], MARKET_INDICES.emea[1],

  // Render skeleton while loading
  document.getElementById('marketsOverview').innerHTML = selected.map(idx => `
    <div class="market-card">
      <div class="market-region">${idx.region}</div>
      <div class="market-index">${idx.name}</div>
      <div class="market-value" style="color:var(--text-muted)">—</div>
      <div class="market-chg" style="color:var(--text-muted)">Loading...</div>
    </div>`).join('');

  let quotes = [];
  try { quotes = await fetchIndexBatch(selected.map(i => i.symbol)); } catch(e) { return; }

  const lookup = {};
  quotes.forEach(q => { if (q.symbol) lookup[q.symbol] = q; });

  document.getElementById('marketsOverview').innerHTML = selected.map(idx => {
    const q = lookup[idx.symbol];
    const price  = q?.regularMarketPrice ?? q?.price ?? null;
    const chgPct = parseFloat(q?.regularMarketChangePercent ?? q?.changesPercentage ?? 0);
    const isUp   = chgPct >= 0;
    const arrow  = isUp ? '▲' : '▼';
    const cls    = isUp ? 'up' : 'dn';
    const displayPrice = price != null ? fmt(price, price > 1000 ? 0 : 2) : '—';
    return `
      <div class="market-card">
        <div class="market-region">${idx.region}</div>
        <div class="market-index">${idx.name}</div>
        <div class="market-value">${displayPrice}</div>
        <div class="market-chg ${cls}">${arrow} ${fmtPct(chgPct)}</div>
      </div>`;
  }).join('');
}

// ── LOAD & FETCH ───────────────────────────────────────────────────────────
async function loadStock(symbol) {
  document.getElementById('results').style.display = 'none';
  document.getElementById('errorState').style.display = 'none';
  document.getElementById('loadingState').style.display = 'block';

  try {
    // Parallel fetch: quote + company profile
    const [quote, profile] = await Promise.all([
      fetchQuote(symbol),
      fetchProfile(symbol)
    ]);

    document.getElementById('loadingState').style.display = 'none';

    const merged = buildProfile(symbol, quote, profile);
    cachedProfile = merged;

    renderStock(merged, symbol);
    startAutoRefresh(symbol);

  } catch(err) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').style.display = 'block';
    document.getElementById('errorState').innerHTML = `
      <div class="error-state">
        <span>⚠</span>
        <span>Failed to load <strong>${symbol}</strong>: ${err.message}. 
        Check your API key, symbol format, or RapidAPI quota.</span>
      </div>`;
    console.error('ATLAS API error:', err);
  }
}

// Map raw API response → normalised profile object
function buildProfile(symbol, q, p) {
  const price    = q.regularMarketPrice ?? q.price ?? 0;
  const currency = q.currency || 'USD';
  const exchange = q.fullExchangeName || q.exchange || '—';

  // Determine region from exchange
  const regionMap = {
    'LSE':'EMEA','XETRA':'EMEA','Xetra':'EMEA','Euronext':'EMEA',
    'SIX':'EMEA','Amsterdam':'EMEA','Paris':'EMEA','Milan':'EMEA',
    'Tokyo':'APAC','Hong Kong':'APAC','ASX':'APAC','Seoul':'APAC',
    'Shanghai':'APAC','Shenzhen':'APAC','Singapore':'APAC',
    'NasdaqGS':'AMRS','NASDAQ':'AMRS','NYSE':'AMRS','NYSE American':'AMRS',
    'TSX':'AMRS','Bovespa':'AMRS','Buenos Aires':'AMRS'
  };
  let region = 'AMRS';
  for (const [key, val] of Object.entries(regionMap)) {
    if (exchange.includes(key)) { region = val; break; }
  }

  const div = q.dividendRate
    ? `${fmt(q.dividendRate)} (${fmt(q.dividendYield * 100, 2)}%)`
    : 'N/A';

  return {
    symbol,
    name:      q.longName || q.shortName || symbol,
    exchange,
    region,
    sector:    p?.sector || q.sector || '—',
    currency,
    price,
    prevClose: q.regularMarketPreviousClose ?? price,
    open:      q.regularMarketOpen ?? price,
    dayHigh:   q.regularMarketDayHigh ?? price,
    dayLow:    q.regularMarketDayLow  ?? price,
    chgAbs:    q.regularMarketChange  ?? 0,
    chgPct:    q.regularMarketChangePercent ?? 0,
    vol:       fmtBig(q.regularMarketVolume),
    avgvol:    fmtBig(q.averageDailyVolume3Month ?? q.averageVolume),
    mktcap:    fmtBig(q.marketCap),
    pe:        q.trailingPE        != null ? fmt(q.trailingPE, 1)        : '—',
    eps:       q.epsTrailingTwelveMonths != null ? fmt(q.epsTrailingTwelveMonths) : '—',
    div,
    beta:      q.beta              != null ? fmt(q.beta, 2)              : '—',
    week52hi:  q.fiftyTwoWeekHigh  ?? price * 1.2,
    week52lo:  q.fiftyTwoWeekLow   ?? price * 0.8,
    summary:   p?.longBusinessSummary || 'No company description available for this symbol.',
    founded:   p?.foundedYear?.toString() || '—',
    hq:        [p?.city, p?.country].filter(Boolean).join(', ') || '—',
    employees: p?.fullTimeEmployees ? fmt(p.fullTimeEmployees, 0) : '—',
  };
}

  // HEADER
  document.getElementById('stockHeader').innerHTML = `
    <div class="stock-title-block">
      <div class="stock-symbol-line">
        <div class="stock-symbol">${symbol}</div>
        <div class="stock-exchange-badge">${profile.exchange}</div>
        <div class="stock-exchange-badge" style="color:var(--text-muted);border-color:var(--border)">${profile.region}</div>

      </div>
      <div class="stock-name">${profile.name}</div>
    </div>

      <div class="main-price" id="livePrice">${profile.currency} ${fmt(profile.price)}</div>

    </div>
    <div class="range-label-row">

      <span style="color:var(--accent-green)">${fmt(profile.week52hi)}</span>

  // ATTRIBUTES

    { key:'PREV CLOSE',val: fmt(profile.prevClose) },
    { key:'DAY HIGH',  val: fmt(profile.dayHigh),   cls:'up' },
    { key:'DAY LOW',   val: fmt(profile.dayLow),    cls:'dn' },
    { key:'VOLUME',    val: profile.vol },
    { key:'AVG VOL',   val: profile.avgvol },
    { key:'MKT CAP',   val: profile.mktcap,         cls:'highlight' },
    { key:'P/E RATIO', val: profile.pe,              cls: parseFloat(profile.pe) > 30 ? 'amber' : '' },
    { key:'EPS',       val: `${profile.currency} ${profile.eps}` },
    { key:'DIVIDEND',  val: profile.div },
    { key:'BETA',      val: profile.beta,            cls: parseFloat(profile.beta) > 1.5 ? 'amber' : '' },
    { key:'CURRENCY',  val: profile.currency,        cls:'highlight' },
  ];

  document.getElementById('attrGrid').innerHTML = attrs.map(a =>
    `<div class="attr-row">
      <div class="attr-key">${a.key}</div>
      <div class="attr-val ${a.cls||''}">${a.val}</div>
    </div>`).join('');

  // SUMMARY
  document.getElementById('summaryContent').innerHTML = `
    <div class="summary-text">${profile.summary}</div>
    <div class="summary-meta">
      <div class="summary-meta-item">
        <div class="summary-meta-key">FOUNDED</div>

  document.getElementById('results').classList.add('visible');
  document.getElementById('lastUpdated').textContent =
    'LAST UPDATED: ' + new Date().toUTCString().split(' ')[4] + ' UTC';

  await renderChart(symbol, profile, currentTimeframe);

// ── CHART ──────────────────────────────────────────────────────────────────
async function renderChart(symbol, profile, timeframe) {
  let labels = [], prices = [];

  // Show loading state in chart area
  if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

  try {
    const result = await fetchChart(symbol, timeframe);
    labels = result.labels;
    prices = result.prices;
  } catch(e) {
    console.warn('Chart fetch failed:', e.message);
    return;
  }

  if (!prices.length) return;

  const isUp = prices[prices.length-1] >= prices[0];
  const lineColor = isUp ? '#00e5a0' : '#ff4757';

  const ctx = document.getElementById('priceChart').getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, 260);
  gradient.addColorStop(0, isUp ? 'rgba(0,229,160,0.18)' : 'rgba(255,71,87,0.18)');
  gradient.addColorStop(1, 'rgba(0,0,0,0)');

  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: prices,
        borderColor: lineColor,
        borderWidth: 1.5,
        backgroundColor: gradient,
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: lineColor,
        pointHoverBorderColor: '#fff',
        pointHoverBorderWidth: 1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#16202c',
          borderColor: '#1e2d3d',
          borderWidth: 1,
          titleColor: '#7a9bb5',
          bodyColor: '#e8f0f8',
          titleFont: { family:'IBM Plex Mono', size:10 },
          bodyFont: { family:'IBM Plex Mono', size:12, weight:'500' },
          padding: 10,
          callbacks: {
            label: ctx => `  ${profile.currency} ${fmt(ctx.raw)}`
          }
        }
      },
      scales: {
        x: {
          grid: { color:'rgba(30,45,61,0.6)', drawBorder:false },
          ticks: {
            color:'#3a5570',
            font: { family:'IBM Plex Mono', size:9 },
            maxTicksLimit: 8,
            maxRotation: 0
          },
          border: { display:false }
        },
        y: {
          position: 'right',
          grid: { color:'rgba(30,45,61,0.6)', drawBorder:false },
          ticks: {
            color:'#3a5570',
            font: { family:'IBM Plex Mono', size:9 },
            maxTicksLimit: 6,
            callback: val => profile.currency + ' ' + fmt(val)
          },
          border: { display:false }
        }
      }
    }
  });
}

// ── AUTO REFRESH (live price tick every 30s) ───────────────────────────────
const REFRESH_INTERVAL = 30000;

function startAutoRefresh(symbol) {
  if (refreshInterval) clearInterval(refreshInterval);
  animateRefreshBar();
  refreshInterval = setInterval(async () => {
    try {
      const q = await fetchQuote(symbol);
      if (!q) return;
      const price  = q.regularMarketPrice ?? q.price ?? 0;
      const chgPct = q.regularMarketChangePercent ?? 0;
      const chgAbs = q.regularMarketChange ?? 0;
      const isUp   = chgPct >= 0;
      const currency = cachedProfile?.currency || 'USD';

      const liveEl = document.getElementById('livePrice');
      const chgEl  = document.getElementById('livePriceChg');
      if (!liveEl || !chgEl) return;

      liveEl.textContent = `${currency} ${fmt(price)}`;
      liveEl.style.color = isUp ? 'var(--accent-green)' : 'var(--accent-red)';
      setTimeout(() => { liveEl.style.color = 'var(--text-primary)'; }, 800);

      chgEl.textContent = `${isUp?'▲':'▼'} ${fmt(Math.abs(chgAbs))} (${fmtPct(chgPct)}) TODAY`;
      chgEl.className   = `price-change ${isUp?'up':'dn'}`;

      document.getElementById('lastUpdated').textContent =
        'LAST UPDATED: ' + new Date().toUTCString().split(' ')[4] + ' UTC';

      // Update cached price
      if (cachedProfile) {
        cachedProfile.price  = price;
        cachedProfile.chgPct = chgPct;
        cachedProfile.chgAbs = chgAbs;
      }
    } catch(e) { /* silent on refresh error */ }
    animateRefreshBar();
  }, REFRESH_INTERVAL);
}

function animateRefreshBar() {
  const bar = document.getElementById('refreshProgress');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    bar.style.transition = `width ${REFRESH_INTERVAL}ms linear`;
    bar.style.width = '100%';
  });
}

// ── INIT ───────────────────────────────────────────────────────────────────
buildQuickSymbols();

if (apiKeyMissing()) {
  // Show API key setup instructions instead of loading data
  showApiKeyWarning();
  buildTicker();  // ticker will show dashes but won't error
  // Render skeleton market cards
  const skeletonIndices = [
    ...MARKET_INDICES.amrs.slice(0,2),
    ...MARKET_INDICES.emea.slice(0,2),
    ...MARKET_INDICES.apac.slice(0,2)
  ];
  document.getElementById('marketsOverview').innerHTML = skeletonIndices.map(idx => `
    <div class="market-card">
      <div class="market-region">${idx.region}</div>
      <div class="market-index">${idx.name}</div>
      <div class="market-value" style="color:var(--text-muted)">—</div>
      <div class="market-chg" style="color:var(--text-muted)">API key required</div>
    </div>`).join('');
} else {
  // Live mode — fetch everything
  buildTicker();
  buildMarketOverview();
  // Auto-refresh market cards every 60s
  setInterval(() => { buildMarketOverview(); }, 60000);
  // Load default stock
  loadStock('AAPL');
  document.getElementById('symbolInput').value = 'AAPL';
}
</script>
</body>
</html>
